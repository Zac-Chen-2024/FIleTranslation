<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集成翻译平台 - 增强版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 添加动态背景效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(147, 51, 234, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(16, 185, 129, 0.06) 0%, transparent 50%);
            z-index: -1;
            animation: backgroundShift 20s ease-in-out infinite;
        }

        @keyframes backgroundShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .container {
            display: flex;
            min-height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            border-radius: 0 0 20px 20px;
            overflow: hidden;
            box-shadow: 
                0 0 50px rgba(59, 130, 246, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .left-panel {
            flex: 0 0 450px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-right: 1px solid rgba(59, 130, 246, 0.2);
            overflow-y: auto;
            position: relative;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent,
                rgba(59, 130, 246, 0.6),
                rgba(147, 51, 234, 0.6),
                transparent
            );
        }

        .right-panel {
            flex: 1;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(15px);
            padding: 30px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .header h1 {
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.4em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }

        .header p {
            color: #cbd5e1;
            font-size: 1.1em;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #ffffff !important;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.6em;
            margin-left: 8px;
            font-weight: 600;
            box-shadow: 
                0 2px 8px rgba(59, 130, 246, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            -webkit-text-fill-color: #ffffff !important;
            background-clip: padding-box !important;
            -webkit-background-clip: padding-box !important;
        }

        .translation-options {
            margin-bottom: 30px;
        }

        .option-group {
            margin-bottom: 25px;
        }

        .option-label {
            font-weight: 600;
            margin-bottom: 15px;
            color: #f8fafc;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #3b82f6, transparent);
            padding: 8px 0;
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
        }

        .sub-label {
            font-weight: 600;
            margin-bottom: 10px;
            color: #f8fafc;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.6), transparent);
            padding: 6px 0;
            border-left: 2px solid rgba(59, 130, 246, 0.8);
            padding-left: 10px;
            border-radius: 0 4px 4px 0;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            padding: 18px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .radio-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(59, 130, 246, 0.08), 
                transparent
            );
            transition: left 0.3s ease;
        }

        .radio-item:hover::before {
            left: 100%;
        }

        .radio-item:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 
                0 10px 25px rgba(59, 130, 246, 0.15),
                0 0 0 1px rgba(59, 130, 246, 0.1);
            background: rgba(59, 130, 246, 0.03);
        }

        .radio-item.active {
            border-color: #3b82f6;
            background: linear-gradient(135deg, 
                rgba(59, 130, 246, 0.08), 
                rgba(147, 51, 234, 0.03)
            );
            box-shadow: 
                0 0 20px rgba(59, 130, 246, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .radio-item input[type="radio"] {
            display: none;
        }

        .radio-item label {
            cursor: pointer;
            font-weight: 500;
            flex: 1;
            color: #f8fafc;
            font-size: 1.05em;
        }

        .radio-item .description {
            font-size: 0.9em;
            color: #cbd5e1;
            margin-top: 4px;
            font-weight: 300;
        }

        .radio-item.active {
            border-color: #3b82f6;
            background: linear-gradient(135deg, 
                rgba(59, 130, 246, 0.25), 
                rgba(147, 51, 234, 0.15)
            );
            box-shadow: 
                0 0 25px rgba(59, 130, 246, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .radio-item.active label {
            color: #ffffff;
        }

        .radio-item.active .description {
            color: #e2e8f0;
        }

        .input-section {
            margin-top: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #f8fafc;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.8);
            color: #f1f5f9;
            backdrop-filter: blur(10px);
        }

        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 
                0 0 0 3px rgba(59, 130, 246, 0.1),
                0 0 20px rgba(59, 130, 246, 0.15);
            background: rgba(15, 23, 42, 0.95);
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            border: none;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .file-upload-btn:hover {
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(59, 130, 246, 0.4);
        }

        /* 增强版文件上传样式 */
        .file-upload-enhanced {
            width: 100%;
        }

        .file-upload-area {
            border: 2px dashed rgba(59, 130, 246, 0.5);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .file-upload-area::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(59, 130, 246, 0.1),
                transparent
            );
            animation: rotate 3s linear infinite;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .file-upload-area:hover::before {
            opacity: 1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .file-upload-area:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2);
        }

        .file-upload-icon {
            font-size: 24px;
            margin-bottom: 15px;
            opacity: 0.7;
            font-weight: 700;
            color: #3b82f6;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .file-upload-text {
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .primary-text {
            font-size: 18px;
            font-weight: 500;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .secondary-text {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 5px;
        }

        .file-size-hint {
            font-size: 12px;
            color: #94a3b8;
        }

        .file-upload-area .file-upload-btn {
            display: inline-block;
            width: auto;
            padding: 12px 24px;
            margin: 0;
            border-radius: 6px;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }

        /* 文件预览样式 */
        .file-preview {
            margin-top: 15px;
            border: 2px dashed rgba(59, 130, 246, 0.5);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            height: 200px; /* 匹配上传区域的高度 */
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            background: linear-gradient(90deg, 
                rgba(59, 130, 246, 0.1), 
                rgba(147, 51, 234, 0.05)
            );
            padding: 8px 12px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; /* 防止收缩 */
            height: 36px; /* 固定头部高度，减小以匹配总高度 */
        }

        .preview-title {
            font-weight: 500;
            color: #f1f5f9;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .remove-file-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
        }

        .remove-file-btn:hover {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .preview-content {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e1;
            font-size: 1.1em;
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
            overflow-y: auto;
        }

        .preview-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(147, 51, 234, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .preview-content.has-content {
            align-items: flex-start;
            justify-content: flex-start;
            color: #f1f5f9;
        }

        /* 图片预览样式 - 固定大小和比例缩放 */
        .preview-image {
            width: 100px;
            height: 80px;
            object-fit: contain;
            object-position: center;
            border-radius: 6px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            flex-shrink: 0; /* 防止图片被压缩 */
        }

        /* 调整图片预览时的preview-content */
        .preview-content.image-preview {
            padding: 30px 20px; /* 与file-upload-area保持一致 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1; /* 占用剩余空间 */
            gap: 10px;
        }

        /* 文件信息样式调整 */
        .file-info {
            flex: 1;
            margin-left: 12px;
            padding: 8px;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 6px;
            border: 1px solid rgba(59, 130, 246, 0.1);
            min-width: 0; /* 允许内容收缩 */
        }

        .file-name {
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 4px;
            word-break: break-word;
            font-size: 0.8em;
            line-height: 1.2;
        }

        .file-size, .file-type {
            font-size: 0.7em;
            color: #cbd5e1;
            margin-bottom: 2px;
            line-height: 1.1;
        }

        /* 图片和文件信息的容器 */
        .image-info-container {
            display: flex;
            align-items: flex-start;
            width: 100%;
            gap: 0;
        }

        .result-content {
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .result-item {
            margin-bottom: 15px;
            padding: 20px;
            background: linear-gradient(135deg, 
                rgba(59, 130, 246, 0.05), 
                rgba(147, 51, 234, 0.02)
            );
            border-radius: 12px;
            border-left: 4px solid #3b82f6;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .result-item h4 {
            margin-bottom: 12px;
            color: #f1f5f9;
            font-size: 1.1em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-item p {
            margin: 8px 0;
            color: #cbd5e1;
            line-height: 1.5;
        }

        .result-item .success {
            color: #10b981;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        .result-item .error {
            color: #ef4444;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        .loading {
            display: none;
            text-align: center;
            color: #3b82f6;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
            backdrop-filter: blur(10px);
            border: 1px solid;
        }

        .status-message.success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);
        }

        .status-message.warning {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.3);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.1);
        }

        .log-container {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            padding: 15px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 12px;
            display: none;
            backdrop-filter: blur(15px);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .log-container.show {
            display: block;
        }

        .log-entry {
            margin-bottom: 6px;
            padding: 4px 0;
            border-left: 2px solid transparent;
            padding-left: 8px;
            transition: all 0.2s ease;
        }

        .log-entry:hover {
            background: rgba(59, 130, 246, 0.05);
            border-left-color: #3b82f6;
        }

        .log-entry.info { 
            color: #3b82f6; 
            border-left-color: rgba(59, 130, 246, 0.3);
        }
        .log-entry.success { 
            color: #10b981; 
            border-left-color: rgba(16, 185, 129, 0.3);
        }
        .log-entry.warning { 
            color: #f59e0b; 
            border-left-color: rgba(245, 158, 11, 0.3);
        }
        .log-entry.error { 
            color: #ef4444; 
            border-left-color: rgba(239, 68, 68, 0.3);
        }
        .log-entry.debug { 
            color: #8b5cf6; 
            border-left-color: rgba(139, 92, 246, 0.3);
        }

        .hidden {
            display: none !important;
        }

        .backend-status {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .backend-status::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                #64748b, 
                #3b82f6, 
                #64748b
            );
        }

        .backend-status.connected::before {
            background: linear-gradient(90deg, 
                #10b981, 
                #34d399, 
                #10b981
            );
        }

        .backend-status.error::before {
            background: linear-gradient(90deg, 
                #ef4444, 
                #f87171, 
                #ef4444
            );
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #64748b;
            animation: pulse-dot 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {
            0%, 100% { 
                opacity: 1; 
                transform: scale(1);
            }
            50% { 
                opacity: 0.7; 
                transform: scale(1.1);
            }
        }

        .status-text {
            color: #f8fafc;
            font-weight: 500;
            font-size: 0.9em;
        }

        .backend-status p {
            color: #cbd5e1;
            margin: 5px 0 0 22px;
            font-size: 0.8em;
            opacity: 0.8;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3b82f6, #1d4ed8);
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #1d4ed8, #1e40af);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                border-radius: 0;
            }

            .left-panel {
                flex: none;
                border-right: none;
                border-bottom: 1px solid rgba(59, 130, 246, 0.3);
                padding-bottom: 100px; /* 为固定按钮留出空间 */
            }

            .right-panel {
                padding: 20px;
            }

            .result-preview-section {
                margin-bottom: 15px;
                padding: 15px;
                min-height: 250px;
            }

            .result-details-section {
                padding: 15px;
            }

            if (file) {

                reader.readAsDataURL(file);

        }

        function addLogEntry(message, type = 'info') {
            const logContent = document.getElementById('log-content');

            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            
            // 简化的日志格式，移除emoji
            const prefix = {
                'info': '[INFO]',
                'success': '[SUCCESS]',
                'warning': '[WARNING]',
                'error': '[ERROR]',
                'debug': '[DEBUG]'
            };
            
            logEntry.textContent = `[${timestamp}] ${prefix[type] || '[INFO]'} ${message}`;
            logContent.appendChild(logEntry);
            
            // 自动滚动到底部
            logContent.scrollTop = logContent.scrollHeight;
        }

                        addLogEntry('准备调用Google翻译API', 'info');

                        requestData = {
                            url: googleUrl
                        };
                        
                        endpoint = '/api/webpage-google-translate';
                        isValid = true;
                        showLoading('正在使用稳定版翻译...');
                        break;

                    case 'baidu-image':

                        const baiduFromLang = document.getElementById('baidu-from-lang').value;
                        const baiduToLang = document.getElementById('baidu-to-lang').value;
                        const baiduImageFile = document.getElementById('baidu-image-file').files[0];

                        }

                        // 验证文件大小（限制10MB）
                        const maxBaiduSize = 10 * 1024 * 1024; // 10MB
                        if (baiduImageFile.size > maxBaiduSize) {

                        }

                        // 验证文件类型
                        const allowedBaiduTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/bmp', 'image/gif', 'image/tiff'];
                        if (!allowedBaiduTypes.includes(baiduImageFile.type)) {
                            throw new Error(`不支持的文件类型: ${baiduImageFile.type}`);

                        addLogEntry(`翻译方向: ${baiduFromLang} -> ${baiduToLang}`, 'info');
                        addLogEntry('使用后端配置的API密钥', 'debug');
                        addLogEntry('准备调用百度图片翻译API', 'info');

                        const baiduFormData = new FormData();
                        baiduFormData.append('image', baiduImageFile);
                        baiduFormData.append('from_lang', baiduFromLang);

                // 调用后端API
                addLogEntry('发送请求到后端服务', 'info');
                const response = await callBackendAPI(endpoint, requestData, isFormData);

                    throw new Error(response.error || '翻译失败');
                }
                
            } catch (error) {
                hideLoading();
                addLogEntry(`处理失败: ${error.message}`, 'error');
                showStatusMessage(error.message, 'error');
                console.error('Translation error:', error);
            }
        }

        async function callBackendAPI(endpoint, data, isFormData = false) {
            const url = `${backendUrl}${endpoint}`;
            
            const options = {
                method: 'POST',
                body: isFormData ? data : JSON.stringify(data)
            };

            if (!isFormData) {
                options.headers = {
                    'Content-Type': 'application/json'
                };
            }

            const response = await fetch(url, options);
            return await response.json();
        }

        // PDF iframe处理函数
        function handlePdfIframeLoad(iframe) {
            console.log('🔄 PDF iframe 加载事件触发');
            console.log('  - 当前src:', iframe.src);
            console.log('  - iframe状态:', iframe.readyState);
            
            // 检查iframe是否指向了错误的URL
            if (iframe.src === `${backendUrl}/` || iframe.src === backendUrl || iframe.src === 'about:blank') {
                console.error('❌ iframe被重定向到错误的URL:', iframe.src);
                handlePdfIframeError(iframe);
                return;
            }
            
            // 检查是否是PDF预览URL
            if (!iframe.src.includes('/preview/')) {
                console.error('❌ iframe URL不是预览URL:', iframe.src);
                handlePdfIframeError(iframe);
                return;
            }
            
            // 延迟一点时间再显示，确保PDF真正加载完成
            setTimeout(() => {
                iframe.style.opacity = '1';
                
                // 隐藏加载提示
                const fallback = iframe.parentElement.querySelector('.pdf-fallback');
                if (fallback) {
                    fallback.style.display = 'none';
                }
                
                console.log('✅ PDF预览显示成功');
            }, 500);
        }

        function handlePdfIframeError(iframe) {
            console.error('PDF iframe 加载失败, src:', iframe.src);
            iframe.style.opacity = '0';
            
            // 尝试备用预览方案
            if (tryAlternativePdfPreview(iframe)) {
                console.log('尝试使用备用PDF预览方案');
                return;
            }
            
            // 显示错误提示
            const fallback = iframe.parentElement.querySelector('.pdf-fallback');
            if (fallback) {

                    </button>
                `;
            }
        }

        // 尝试备用PDF预览方案
        function tryAlternativePdfPreview(iframe) {
            try {
                const container = iframe.parentElement;
                const pdfUrl = iframe.src;
                
                // 创建object元素作为备用
                const objectElement = document.createElement('object');
                objectElement.data = pdfUrl;
                objectElement.type = 'application/pdf';
                objectElement.style.width = '100%';
                objectElement.style.height = '100%';
                objectElement.style.border = 'none';
                
                // 添加失败回调
                objectElement.onerror = function() {
                    console.error('备用PDF预览方案也失败了');
                    return false;
                };
                
                // 替换iframe
                container.removeChild(iframe);
                container.appendChild(objectElement);
                
                console.log('已切换到object元素预览PDF');
                return true;
                
            } catch (error) {
                console.error('备用PDF预览方案失败:', error);
                return false;
            }
        }

        // 检测iframe是否真正加载了PDF内容
        function checkIframeContent(iframe) {
            try {
                // 检查iframe是否成功加载
                if (iframe.contentWindow && iframe.contentWindow.location.href === 'about:blank') {
                    console.warn('iframe内容为空白页面');
                    handlePdfIframeError(iframe);
                    return false;
                }
                
                // 检查响应状态
                fetch(iframe.src)
                    .then(response => {
                        if (!response.ok) {
                            console.error('PDF文件请求失败:', response.status, response.statusText);
                            handlePdfIframeError(iframe);
                        } else {
                            console.log('PDF文件请求成功:', response.status);
                        }
                    })
                    .catch(error => {
                        console.error('PDF文件检查失败:', error);
                        handlePdfIframeError(iframe);
                    });
                
                return true;
            } catch (e) {
                console.error('检查iframe内容时出错:', e);
                return false;
            }
        }

        // 检查浏览器PDF支持
        function checkPdfSupport() {
            // 检查浏览器是否支持PDF嵌入
            const pdfPluginSupported = navigator.mimeTypes && navigator.mimeTypes['application/pdf'];
            const chromeWithPdfViewer = navigator.userAgent.indexOf('Chrome') > -1;
            const firefoxWithPdfViewer = navigator.userAgent.indexOf('Firefox') > -1;
            
            return pdfPluginSupported || chromeWithPdfViewer || firefoxWithPdfViewer;
        }

                <div style="padding: 10px; background: #3b82f6; color: white; font-weight: bold;">
                    PDF预览功能测试
                    <button onclick="this.parentElement.parentElement.remove()" 
                            style="float: right; background: none; border: none; color: white; cursor: pointer;">✕</button>
                </div>
                <iframe src="${testUrl}" style="width: 100%; height: calc(100% - 40px); border: none;"></iframe>
            `;
            
            document.body.appendChild(testContainer);
            
            // 5秒后自动关闭
            setTimeout(() => {
                if (testContainer.parentElement) {
                    testContainer.remove();
                    console.log('✅ PDF预览功能测试完成');
                }
            }, 5000);
        };

        // 图片布局优化函数
        function optimizeImageLayout(containerId) {
            try {
                const container = document.getElementById(containerId);
                if (!container) return;
                
                const originalImg = document.getElementById(`${containerId}-original`);
                const translatedImg = document.getElementById(`${containerId}-translated`);
                
                // 等待两张图片都加载完成
                if (!originalImg || !translatedImg || !originalImg.complete || !translatedImg.complete) {
                    // 如果有图片还没加载完，稍后再试
                    setTimeout(() => optimizeImageLayout(containerId), 100);
                    return;
                }
                
                // 获取容器尺寸
                const containerRect = container.getBoundingClientRect();
                const containerWidth = containerRect.width - 30; // 减去padding
                const containerHeight = containerRect.height - 30;
                
                // 获取图片原始尺寸
                const img1Width = originalImg.naturalWidth || originalImg.width;
                const img1Height = originalImg.naturalHeight || originalImg.height;
                const img2Width = translatedImg.naturalWidth || translatedImg.width;
                const img2Height = translatedImg.naturalHeight || translatedImg.height;
                
                console.log(`容器尺寸: ${containerWidth} x ${containerHeight}`);
                console.log(`原图尺寸: ${img1Width} x ${img1Height}`);
                console.log(`翻译图尺寸: ${img2Width} x ${img2Height}`);
                
                if (img1Width === 0 || img1Height === 0 || img2Width === 0 || img2Height === 0) {
                    console.log('图片尺寸无效，使用默认布局');
                    return;
                }
                
                // 计算图片的长宽比
                const img1Ratio = img1Width / img1Height;
                const img2Ratio = img2Width / img2Height;
                const containerRatio = containerWidth / containerHeight;
                
                // 计算两种布局方案的空间利用率
                let horizontalUtilization = 0;
                let verticalUtilization = 0;
                
                // 水平排列时的计算
                const horizontalAvailableWidth = containerWidth / 2 - 7.5; // 减去gap的一半
                const horizontalImg1Scale = Math.min(
                    horizontalAvailableWidth / img1Width,
                    containerHeight / img1Height
                );
                const horizontalImg2Scale = Math.min(
                    horizontalAvailableWidth / img2Width,
                    containerHeight / img2Height
                );
                horizontalUtilization = (
                    (img1Width * horizontalImg1Scale) + (img2Width * horizontalImg2Scale) + 15
                ) / containerWidth;
                
                // 垂直排列时的计算
                const verticalAvailableHeight = containerHeight / 2 - 30; // 减去标题和gap
                const verticalImg1Scale = Math.min(
                    containerWidth / img1Width,
                    verticalAvailableHeight / img1Height
                );
                const verticalImg2Scale = Math.min(
                    containerWidth / img2Width,
                    verticalAvailableHeight / img2Height
                );
                verticalUtilization = Math.max(
                    (img1Height * verticalImg1Scale + 30) / containerHeight,
                    (img2Height * verticalImg2Scale + 30) / containerHeight
                );
                
                console.log(`水平布局利用率: ${horizontalUtilization.toFixed(3)}`);
                console.log(`垂直布局利用率: ${verticalUtilization.toFixed(3)}`);
                
                // 选择空间利用率更高的布局
                const useHorizontal = horizontalUtilization >= verticalUtilization;
                
                // 应用布局
                container.className = `preview-image-container ${useHorizontal ? 'horizontal' : 'vertical'}`;
                
                console.log(`选择${useHorizontal ? '水平' : '垂直'}布局`);
                
                // 强制重新布局
                setTimeout(() => {
                    container.style.display = 'none';
                    container.offsetHeight; // 触发重排
                    container.style.display = 'flex';
                }, 10);
                
            } catch (error) {
                console.error('布局优化失败:', error);
            }
        }

        // 添加错误处理
        window.addEventListener('error', function(e) {
            hideLoading();
            addLogEntry(`应用程序错误: ${e.error?.message || e.message}`, 'error');
            showStatusMessage('发生了一个错误，请检查控制台', 'error');
            console.error('Application error:', e.error);
        });
    </script>
